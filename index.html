<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth for LDR</title>

    <!-- โหลด MediaPipe สำหรับตรวจจับมือด้วย AI -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.6rem;
            margin: 10px 0 20px 0;
            color: #333;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .box h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #444;
        }

        .view-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        video {
            display: none;
        }

        .booth-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #live-canvas {
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .toolbar {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        button, .smart-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        button:active, .smart-btn:active {
            transform: scale(0.98);
        }

        .btn-snap {
            background-color: #28a745;
            color: white;
        }
        .btn-snap:hover { background-color: #218838; }

        .btn-clear {
            background-color: #6c757d;
            color: white;
        }
        .btn-clear:hover { background-color: #5a6268; }

        .btn-download {
            background-color: #ffc107;
            color: #212529;
            text-shadow: none;
            width: 100%;
        }
        .btn-download:hover { background-color: #e0a800; }

        .smart-btn {
            position: relative;
            background-color: #e9ecef;
            color: #495057;
            text-shadow: none;
            border: 1px solid #ced4da;
        }

        #custom-color {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            border: 1px solid rgba(0,0,0,0.2);
            display: inline-block;
        }
    </style>
</head>

<body>

    <h1>📸 My AI Web Photo Booth</h1>

    <div class="container">
        <div class="box">
            <h3>Live Preview</h3>
            <div class="view-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="live-canvas"></canvas>
            </div>

            <div class="toolbar">
                <div id="smart-draw-btn" class="smart-btn">
                    <span id="color-dot" class="color-indicator" style="background-color: #00f2fe; display: none;"></span>
                    <span id="btn-text">🖌️ โหมดวาดรูป: ปิด</span>
                    <input type="color" id="custom-color" value="#00f2fe">
                </div>

                <button id="clear-btn" class="btn-clear">🗑️ ล้างเส้น</button>
                <button id="snap-btn" class="btn-snap">📸 ถ่ายรูป</button>
            </div>
        </div>

        <div class="box">
            <h3>Captured Photo</h3>
            <div class="view-wrapper">
                <canvas id="photo-canvas" class="booth-canvas"></canvas>
            </div>

            <div class="toolbar">
                <button id="download-btn" class="btn-download">💾 ดาวน์โหลดรูปภาพ</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const liveCanvas = document.getElementById('live-canvas');
        const liveCtx = liveCanvas.getContext('2d');
        const photoCanvas = document.getElementById('photo-canvas');
        const photoCtx = photoCanvas.getContext('2d');

        const snapBtn = document.getElementById('snap-btn');
        const clearBtn = document.getElementById('clear-btn');
        const downloadBtn = document.getElementById('download-btn');

        const smartDrawBtn = document.getElementById('smart-draw-btn');
        const btnText = document.getElementById('btn-text');
        const colorDot = document.getElementById('color-dot');
        const customColorInput = document.getElementById('custom-color');

        let isDrawMode = false;
        let isDrawing = false;
        let drawingPoints = [];
        let currentColor = '#00f2fe'; 

        // 💡 ตัวแปรเก็บพิกัดล่าสุดสำหรับการทำ Smoothing Filter (EMA)
        let smoothedX = null;
        let smoothedY = null;
        const SMOOTH_FACTOR = 0.25; // ยิ่งน้อยยิ่งนุ่มนวล (0.2 - 0.3 คือกำลังดี)

        const frameImage = new Image();
        frameImage.src = 'frame.png';
        frameImage.crossOrigin = "anonymous"; 

        // 1. MediaPipe Hands Setup (อัปเกรดข้อ 3: จูนค่า Confidence สูงขึ้นเพื่อความแม่นยำ)
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.75, // เพิ่มเป็น 0.75 คัดเฟรมหลุด
            minTrackingConfidence: 0.75
        });

        hands.onResults((results) => {
            if (liveCanvas.width !== video.videoWidth && video.videoWidth > 0) {
                liveCanvas.width = video.videoWidth;
                liveCanvas.height = video.videoHeight;
            }

            liveCtx.save();
            liveCtx.drawImage(results.image, 0, 0, liveCanvas.width, liveCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                
                // พิกัดปลายนิ้วชี้ (Index Finger Tip)
                const rawX = landmarks[8].x * liveCanvas.width;
                const rawY = landmarks[8].y * liveCanvas.height;

                // พิกัดปลายนิ้วโป้ง (Thumb Tip) สำหรับตรวจจับการจีบ
                const thumbX = landmarks[4].x * liveCanvas.width;
                const thumbY = landmarks[4].y * liveCanvas.height;

                // 💡 แก้ไขข้อ 1: ใช้เทคนิค Exponential Moving Average เพื่อลดแรงสั่น (Jitter)
                if (smoothedX === null || smoothedY === null) {
                    smoothedX = rawX;
                    smoothedY = rawY;
                } else {
                    smoothedX = (rawX * SMOOTH_FACTOR) + (smoothedX * (1 - SMOOTH_FACTOR));
                    smoothedY = (rawY * SMOOTH_FACTOR) + (smoothedY * (1 - SMOOTH_FACTOR));
                }

                // 💡 แก้ไขข้อ 2: คำนวณระยะห่างเพื่อตรวจจับการ "จีบนิ้ว" (Pinch Gesture)
                const distance = Math.hypot(smoothedX - thumbX, smoothedY - thumbY);
                const PINCH_THRESHOLD = 35; // ระยะพิกเซลที่ถือว่านิ้วชนกัน (ปรับเพิ่มลดได้ตามความถนัด)
                const isPinching = distance < PINCH_THRESHOLD;

                // วาดวงกลมพอยเตอร์ตามสีพู่กันลอยบอกตำแหน่ง
                liveCtx.fillStyle = currentColor;
                liveCtx.strokeStyle = '#ffffff';
                liveCtx.lineWidth = 2;
                liveCtx.beginPath();
                // ถ้าจีบนิ้ว (กำลังวาด) วงกลมจะหดเล็กดูลื่นไหล ถ้าปล่อยนิ้ววงกลมจะโตขึ้น
                liveCtx.arc(smoothedX, smoothedY, isPinching && isDrawMode ? 5 : 10, 0, 2 * Math.PI);
                liveCtx.fill();
                liveCtx.stroke();

                if (isDrawMode) {
                    if (isPinching) {
                        if (!isDrawing) {
                            drawingPoints.push({ x: smoothedX, y: smoothedY, isNewStroke: true, color: currentColor });
                            isDrawing = true;
                        } else {
                            drawingPoints.push({ x: smoothedX, y: smoothedY, isNewStroke: false, color: currentColor });
                        }
                    } else {
                        isDrawing = false; // ปล่อยนิ้ว = หยุดวาดเส้นทันที
                    }
                }
            } else {
                isDrawing = false; 
                smoothedX = null;  // รีเซ็ตตัวกรองเมื่อมือหลุดจากจอ
                smoothedY = null;
            }

            drawLines(liveCtx);
            liveCtx.restore();
        });

        function drawLines(context) {
            if (drawingPoints.length === 0) return;
            context.lineWidth = 6;
            context.lineCap = 'round';
            context.lineJoin = 'round';

            for (let i = 1; i < drawingPoints.length; i++) {
                const pt = drawingPoints[i];
                if (pt.isNewStroke) {
                    context.beginPath();
                    context.moveTo(pt.x, pt.y);
                } else {
                    context.beginPath();
                    context.moveTo(drawingPoints[i-1].x, drawingPoints[i-1].y);
                    context.lineTo(pt.x, pt.y);
                    context.strokeStyle = pt.color; 
                    context.stroke();
                }
            }
        }

        // Camera Setup
        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640,
            height: 480
        });
        camera.start().catch(() => alert("ไม่สามารถเข้าถึงกล้องได้"));

        // ฟังก์ชันคำนวณสีตัวหนังสือ
        function getContrastColor(hexColor) {
            const r = parseInt(hexColor.substr(1, 2), 16);
            const g = parseInt(hexColor.substr(3, 2), 16);
            const b = parseInt(hexColor.substr(5, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#1a1a1a' : '#ffffff';
        }

        // Smart Button Logic
        smartDrawBtn.addEventListener('click', (e) => {
            if (e.target === customColorInput) return;

            if (!isDrawMode) {
                isDrawMode = true;
                colorDot.style.display = "inline-block";
                updateSmartButtonVisual(currentColor);
            } else {
                customColorInput.click();
            }
        });

        customColorInput.addEventListener('input', (e) => {
            currentColor = e.target.value; 
            colorDot.style.backgroundColor = currentColor;
            updateSmartButtonVisual(currentColor);
            isDrawing = false; 
        });

        function updateSmartButtonVisual(color) {
            smartDrawBtn.style.backgroundColor = color;
            smartDrawBtn.style.borderColor = color;
            const textColor = getContrastColor(color);
            smartDrawBtn.style.color = textColor;
            btnText.textContent = "👌 จีบนิ้วเพื่อวาด / คลิกเปลี่ยนสี";
        }

        clearBtn.addEventListener('click', () => {
            drawingPoints = [];
            isDrawing = false;
            isDrawMode = false;
            smoothedX = null;
            smoothedY = null;
            
            smartDrawBtn.style.backgroundColor = "#e9ecef";
            smartDrawBtn.style.borderColor = "#ced4da";
            smartDrawBtn.style.color = "#495057";
            btnText.textContent = "🖌️ โหมดวาดรูป: ปิด";
            colorDot.style.display = "none";
        });

        // Snapshot & Download Logic
        snapBtn.addEventListener('click', () => {
            if (liveCanvas.width === 0) return;
            photoCanvas.width = liveCanvas.width;
            photoCanvas.height = liveCanvas.height;
            photoCtx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);

            photoCtx.save();
            photoCtx.translate(photoCanvas.width, 0);
            photoCtx.scale(-1, 1);
            photoCtx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);
            photoCtx.restore();

            photoCtx.save();
            photoCtx.translate(photoCanvas.width, 0);
            photoCtx.scale(-1, 1);
            drawLines(photoCtx);
            photoCtx.restore();

            if (frameImage.complete && frameImage.naturalWidth !== 0) {
                photoCtx.drawImage(frameImage, 0, 0, photoCanvas.width, photoCanvas.height);
            }
        });

        downloadBtn.addEventListener('click', () => {
            try {
                const dataUrl = photoCanvas.toDataURL('image/png');
                const tempLink = document.createElement('a');
                tempLink.download = `photobooth-${Date.now()}.png`;
                tempLink.href = dataUrl;
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการดาวน์โหลดรูปภาพ");
            }
        });
    </script>
</body>
</html>
