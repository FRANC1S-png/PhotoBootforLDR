<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth for LDR</title>

    <!-- โหลด MediaPipe สำหรับตรวจจับมือด้วย AI -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            padding: 10px;
            margin: 0;
        }

        h1 {
            font-size: 1.8rem;
            margin: 15px 0;
            color: #333;
        }

        /* จัดให้อยู่คนละบรรทัดเสมอไม่ว่าจะจอคอมหรือจอมือถือ แต่ยืดหยุ่นตามหน้าจอ */
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ควบคุมพื้นที่แสดงผลกล้องและรูปภาพให้ยืดหยุ่นตามหน้าจอ */
        .view-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            aspect-ratio: 4/3;
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
        }

        /* ซ่อนวิดีโอจริงไว้เบื้องหลัง */
        video {
            display: none;
        }

        .booth-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* แคนวาสไลฟ์สดให้กลับด้านซ้ายขวา (Mirror) เพื่อให้วาดรูปตามมือได้เป็นธรรมชาติ */
        #live-canvas {
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .toolbar {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ปรับสไตล์ปุ่มหลัก */
        button, .custom-btn {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            background-color: #6c757d; /* เริ่มต้นโหมดปิด (สีเทา) */
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        button:hover, .custom-btn:hover {
            opacity: 0.9;
        }

        /* เมื่อเปิดโหมดวาดรูปจะเป็นสีน้ำเงิน */
        .custom-btn.active {
            background-color: #007bff;
        }

        /* ซ่อนตัวเลือกสีของระบบไว้แอบๆ ไม่ให้บังปุ่ม */
        #custom-color {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        /* วงกลมเล็กๆ เพื่อโชว์เฉดสีปัจจุบันบนปุ่ม */
        .color-preview-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-left: 8px;
            border: 1px solid white;
            display: inline-block;
        }

        .btn-success {
            background-color: #28a745;
        }
        .btn-success:hover {
            background-color: #218838;
        }
        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }
    </style>
</head>

<body>

    <h1>📸 My AI Web Photo Booth</h1>

    <div class="container">
        <!-- ฝั่งกล้องสด + AI ตรวจจับนิ้วมือ -->
        <div class="box">
            <h3>Live Preview</h3>
            <div class="view-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="live-canvas"></canvas>
            </div>

            <div class="toolbar">
                <!-- ปุ่มแบบ Custom ที่แยกการทำงานเปิดโหมด / เลือกสี ด้วยเงื่อนไข JS -->
                <div id="draw-mode-btn" class="custom-btn">
                    <span id="btn-text">🖌️ โหมดวาดรูป: ปิดอยู่</span>
                    <span id="color-preview" class="color-preview-dot" style="background-color: #00f2fe; display: none;"></span>
                    <input type="color" id="custom-color" value="#00f2fe">
                </div>

                <button id="clear-btn" class="btn-secondary">🗑️ ลบเส้นวาด</button>
                <button id="snap-btn" class="btn-success">📸 ถ่ายรูป!</button>
            </div>
        </div>

        <!-- ฝั่งรูปผลลัพธ์พร้อมกรอบที่ถ่ายเสร็จแล้ว -->
        <div class="box">
            <h3>Captured Photo</h3>
            <div class="view-wrapper">
                <canvas id="photo-canvas" class="booth-canvas"></canvas>
            </div>

            <div class="toolbar">
                <button id="download-btn" class="btn-success">💾 ดาวน์โหลดรูปภาพ</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const liveCanvas = document.getElementById('live-canvas');
        const liveCtx = liveCanvas.getContext('2d');
        const photoCanvas = document.getElementById('photo-canvas');
        const photoCtx = photoCanvas.getContext('2d');

        const snapBtn = document.getElementById('snap-btn');
        const clearBtn = document.getElementById('clear-btn');
        const downloadBtn = document.getElementById('download-btn');

        // ส่วนประกอบของปุ่มรวมร่างที่ปรับตรรกะใหม่
        const drawModeBtn = document.getElementById('draw-mode-btn');
        const btnText = document.getElementById('btn-text');
        const colorPreview = document.getElementById('color-preview');
        const customColorInput = document.getElementById('custom-color');

        // การตั้งค่าสถานะระบบ
        let isDrawMode = false;
        let isDrawing = false;
        let drawingPoints = [];
        let currentColor = '#00f2fe'; 

        // โหลดกรอบรูปเตรียมไว้
        const frameImage = new Image();
        frameImage.src = 'frame.png';
        frameImage.crossOrigin = "anonymous"; 

        // 1. ระบบวาดเส้นและการตรวจจับนิ้วมือด้วย MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (liveCanvas.width !== video.videoWidth && video.videoWidth > 0) {
                liveCanvas.width = video.videoWidth;
                liveCanvas.height = video.videoHeight;
            }

            liveCtx.save();
            liveCtx.drawImage(results.image, 0, 0, liveCanvas.width, liveCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexFingerTip = landmarks[8];

                const x = indexFingerTip.x * liveCanvas.width;
                const y = indexFingerTip.y * liveCanvas.height;

                liveCtx.fillStyle = '#ff0000';
                liveCtx.beginPath();
                liveCtx.arc(x, y, 10, 0, 2 * Math.PI);
                liveCtx.fill();

                if (isDrawMode) {
                    if (!isDrawing) {
                        drawingPoints.push({ x, y, isNewStroke: true, color: currentColor });
                        isDrawing = true;
                    } else {
                        drawingPoints.push({ x, y, isNewStroke: false, color: currentColor });
                    }
                }
            } else {
                isDrawing = false; 
            }

            drawLines(liveCtx);
            liveCtx.restore();
        });

        function drawLines(context) {
            if (drawingPoints.length === 0) return;

            context.lineWidth = 8;
            context.lineCap = 'round';
            context.lineJoin = 'round';

            context.beginPath();
            context.moveTo(drawingPoints[0].x, drawingPoints[0].y);

            for (let i = 1; i < drawingPoints.length; i++) {
                const pt = drawingPoints[i];
                
                if (pt.isNewStroke) {
                    context.beginPath();
                    context.moveTo(pt.x, pt.y);
                } else {
                    context.beginPath();
                    context.moveTo(drawingPoints[i-1].x, drawingPoints[i-1].y);
                    context.lineTo(pt.x, pt.y);
                    context.strokeStyle = pt.color; 
                    context.stroke();
                }
            }
        }

        // 2. เริ่มต้นเปิดกล้อง
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            },
            width: 640,
            height: 480
        });
        camera.start().catch(err => {
            alert("ไม่สามารถเปิดกล้องได้");
        });

        // 3. 💡 ตรรกะใหม่ตามที่ต้องการ: กดทีแรกเปิดโหมด กดอีกทีเลือกสี
        drawModeBtn.addEventListener('click', (e) => {
            // ป้องกันไม่ให้การคลิกทะลุไปโดน input ตัวเลือกสีในจังหวะแรก
            if (e.target === customColorInput) return;

            if (!isDrawMode) {
                // กดครั้งที่ 1 (เมื่อโหมดปิดอยู่): ทำการเปิดโหมดวาดรูป
                isDrawMode = true;
                drawModeBtn.classList.add('active');
                btnText.textContent = "🎨 คลิกอีกครั้งเพื่อเลือกสี";
                colorPreview.style.display = "inline-block"; // โชว์จุดสีปัจจุบัน
            } else {
                // กดครั้งที่ 2 (เมื่อโหมดเปิดอยู่แล้ว): ทำการเปิดหน้าต่าง Color Picker ของระบบขึ้นมา
                customColorInput.click();
            }
        });

        // เมื่อผู้ใช้เลือกสีจากหน้าต่างเสร็จแล้ว
        customColorInput.addEventListener('input', (e) => {
            currentColor = e.target.value; 
            colorPreview.style.backgroundColor = currentColor; // เปลี่ยนสีวงกลมเล็กๆ บนปุ่มตาม
            isDrawing = false; // ตัดเส้นเก่าเพื่อขึ้นสีใหม่
        });

        // ลบเส้น
        clearBtn.addEventListener('click', () => {
            drawingPoints = [];
            isDrawing = false;
            
            // รีเซ็ตปุ่มกลับไปสถานะปิดโหมด
            isDrawMode = false;
            drawModeBtn.classList.remove('active');
            btnText.textContent = "🖌️ โหมดวาดรูป: ปิดอยู่";
            colorPreview.style.display = "none";
        });

        // 4. ปุ่มถ่ายรูป
        snapBtn.addEventListener('click', () => {
            if (liveCanvas.width === 0) return;

            photoCanvas.width = liveCanvas.width;
            photoCanvas.height = liveCanvas.height;
            photoCtx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);

            photoCtx.save();
            photoCtx.translate(photoCanvas.width, 0);
            photoCtx.scale(-1, 1);
            photoCtx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);
            photoCtx.restore();

            photoCtx.save();
            photoCtx.translate(photoCanvas.width, 0);
            photoCtx.scale(-1, 1);
            drawLines(photoCtx);
            photoCtx.restore();

            if (frameImage.complete && frameImage.naturalWidth !== 0) {
                photoCtx.drawImage(frameImage, 0, 0, photoCanvas.width, photoCanvas.height);
            }
        });

        // 5. ดาวน์โหลดภาพ
        downloadBtn.addEventListener('click', () => {
            try {
                const dataUrl = photoCanvas.toDataURL('image/png');
                const tempLink = document.createElement('a');
                tempLink.download = `photobooth-${Date.now()}.png`;
                tempLink.href = dataUrl;
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการดาวน์โหลด");
            }
        });
    </script>
</body>

</html>
