<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth with Decoration Mode</title>

    <!-- โหลด MediaPipe สำหรับตรวจจับมือด้วย AI -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.6rem;
            margin: 10px 0 20px 0;
            color: #333;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 16px;
            border: 3px solid #000000;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .box h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #444;
        }

        .view-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        video {
            display: none;
        }

        /* สำหรับหน้าตกแต่งรูปภาพ */
        #photo-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: move; /* เปลี่ยน cursor ให้รู้ว่าลากของได้ */
        }

        #live-canvas {
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .toolbar {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        button, .smart-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        button:active, .smart-btn:active {
            transform: scale(0.98);
        }

        .btn-snap { background-color: #28a745; color: white; }
        .btn-snap:hover { background-color: #218838; }

        .btn-clear { background-color: #6c757d; color: white; }
        .btn-clear:hover { background-color: #5a6268; }

        .btn-download { background-color: #ffc107; color: #212529; text-shadow: none; width: 100%; margin-top: 10px;}
        .btn-download:hover { background-color: #e0a800; }

        .btn-back { background-color: #dc3545; color: white; }
        .btn-back:hover { background-color: #bd2130; }

        .smart-btn {
            position: relative;
            background-color: #e9ecef;
            color: #495057;
            text-shadow: none;
            border: 1px solid #ced4da;
        }

        #custom-color {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            border: 1px solid rgba(0,0,0,0.2);
            display: inline-block;
        }

        /* 🎪 ส่วนเลือกไอเทมตกแต่ง (Stickers & Frames) */
        .deco-selector {
            width: 100%;
            margin-top: 15px;
            text-align: left;
        }
        .deco-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }
        .item-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
        }
        .deco-item {
            font-size: 1.8rem;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        .deco-item:hover {
            transform: scale(1.1);
            background: #e9ecef;
        }

        /* ซ่อนส่วนตกแต่งไว้ก่อน จะโชว์เมื่อถ่ายรูปเสร็จ */
        #decoration-zone {
            display: none;
        }
    </style>
</head>

<body>

    <h1>📸 Photo Booth</h1>

    <div class="container">
        
        <!-- 🎥 โหมดที่ 1: หน้าจอถ่ายภาพและวาดรูปสด -->
        <div id="live-zone" class="box">
            <h3>1. Live Preview & Air Draw</h3>
            <div class="view-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="live-canvas"></canvas>
            </div>

            <div class="toolbar">
                <div id="smart-draw-btn" class="smart-btn">
                    <span id="color-dot" class="color-indicator" style="background-color: #00f2fe; display: none;"></span>
                    <span id="btn-text"><img src="asset/paint.png" alt="Paint" style="width: 40px; height: 40px;"></span>
                    <input type="color" id="custom-color" value="#00f2fe">
                </div>
                <button id="clear-btn" class="btn-clear"><img src="asset/trash.png" alt="Clear" style="width: 40px; height: 40px;"></button>
                <button id="snap-btn" class="btn-snap"><img src="asset/camera.png" alt="Snap" style="width: 40px; height: 40px;"></button>
            </div>
        </div>

        <!-- 🎨 โหมดที่ 2: หน้าจอตกแต่งภาพหลังถ่ายเสร็จ -->
        <div id="decoration-zone" class="box">
            <h3>2. Customize</h3>
            <p style="font-size: 0.85rem; color: #666; margin: 0 0 10px 0;">💡 คลิกที่สติกเกอร์เพื่อเพิ่ม แล้วใช้นิ้ว/เมาส์ลากย้ายตำแหน่งบนรูปได้เลย</p>
            
            <div class="view-wrapper">
                <canvas id="photo-canvas"></canvas>
            </div>

            <!-- เลือกสติกเกอร์ (ใช้ Emoji แทนรูปภาพเพื่อให้ทดสอบได้ทันที) -->
            <div class="deco-selector">
                <span class="deco-label">✨ เลือกสติกเกอร์:</span>
                <div class="item-list">
                    <div class="deco-item" onclick="addSticker('❤️')">❤️</div>
                    <div class="deco-item" onclick="addSticker('✨')">✨</div>
                    <div class="deco-item" onclick="addSticker('👑')">👑</div>
                    <div class="deco-item" onclick="addSticker('🕶️')">🕶️</div>
                    <div class="deco-item" onclick="addSticker('🐱')">🐱</div>
                    <div class="deco-item" onclick="addSticker('🌸')">🌸</div>
                </div>
            </div>

            <!-- เลือกกรอบรูป -->
            <div class="deco-selector">
                <span class="deco-label">🖼️ เลือกกรอบรูป:</span>
                <div class="item-list">
                    <div class="deco-item" style="font-size:1rem;" onclick="changeFrame('none')">❌ ไม่มีกรอบ</div>
                    <div class="deco-item" style="font-size:1rem; color: #e83e8c;" onclick="changeFrame('pink')">🌸 กรอบชมพู</div>
                    <div class="deco-item" style="font-size:1rem; color: #007bff;" onclick="changeFrame('blue')">💧 กรอบฟ้า</div>
                </div>
            </div>

            <div class="toolbar">
                <button id="back-btn" class="btn-back">🔄 ถ่ายใหม่</button>
                <button id="download-btn" class="btn-download">💾 ดาวน์โหลดรูปภาพสมบูรณ์</button>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('webcam');
        const liveCanvas = document.getElementById('live-canvas');
        const liveCtx = liveCanvas.getContext('2d');
        const photoCanvas = document.getElementById('photo-canvas');
        const photoCtx = photoCanvas.getContext('2d');

        // โซนสลับหน้า UI
        const liveZone = document.getElementById('live-zone');
        const decorationZone = document.getElementById('decoration-zone');

        const snapBtn = document.getElementById('snap-btn');
        const clearBtn = document.getElementById('clear-btn');
        const backBtn = document.getElementById('back-btn');
        const downloadBtn = document.getElementById('download-btn');

        const smartDrawBtn = document.getElementById('smart-draw-btn');
        const btnText = document.getElementById('btn-text');
        const colorDot = document.getElementById('color-dot');
        const customColorInput = document.getElementById('custom-color');

        // สเตตัสระบบวาดภาพ
        let isDrawMode = false;
        let isDrawing = false;
        let drawingPoints = [];
        let currentColor = '#00f2fe'; 
        let smoothedX = null, smoothedY = null;
        const SMOOTH_FACTOR = 0.25;

        // 💡 ข้อมูลสำหรับระบบตกแต่งรูปภาพ
        let capturedImageBlob = null; // เก็บภาพต้นฉบับที่ถ่ายไว้
        let bgImageElement = new Image(); // Element ภาพพื้นหลังที่จะใช้วาดซ้ำ
        let stickers = []; // Array เก็บสติกเกอร์ที่ถูกแอด [{text, x, y, size}]
        let selectedFrame = 'none'; // สเตตัสกรอบรูปที่เลือก
        let draggedSticker = null; // สติกเกอร์ที่กำลังถูกลากอยู่ ณ ปัจจุบัน

        // --- 1. ระบบ AI ตรวจจับนิ้วมือและลากเส้น (เหมือนเดิมที่สเถียรแล้ว) ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.75,
            minTrackingConfidence: 0.75
        });

        hands.onResults((results) => {
            if (liveCanvas.width !== video.videoWidth && video.videoWidth > 0) {
                liveCanvas.width = video.videoWidth;
                liveCanvas.height = video.videoHeight;
            }

            liveCtx.save();
            liveCtx.drawImage(results.image, 0, 0, liveCanvas.width, liveCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const rawX = landmarks[8].x * liveCanvas.width;
                const rawY = landmarks[8].y * liveCanvas.height;
                const thumbX = landmarks[4].x * liveCanvas.width;
                const thumbY = landmarks[4].y * liveCanvas.height;

                if (smoothedX === null || smoothedY === null) {
                    smoothedX = rawX; smoothedY = rawY;
                } else {
                    smoothedX = (rawX * SMOOTH_FACTOR) + (smoothedX * (1 - SMOOTH_FACTOR));
                    smoothedY = (rawY * SMOOTH_FACTOR) + (smoothedY * (1 - SMOOTH_FACTOR));
                }

                const distance = Math.hypot(smoothedX - thumbX, smoothedY - thumbY);
                const isPinching = distance < 35;

                liveCtx.fillStyle = currentColor;
                liveCtx.strokeStyle = '#ffffff';
                liveCtx.lineWidth = 2;
                liveCtx.beginPath();
                liveCtx.arc(smoothedX, smoothedY, isPinching && isDrawMode ? 5 : 10, 0, 2 * Math.PI);
                liveCtx.fill();
                liveCtx.stroke();

                if (isDrawMode) {
                    if (isPinching) {
                        if (!isDrawing) {
                            drawingPoints.push({ x: smoothedX, y: smoothedY, isNewStroke: true, color: currentColor });
                            isDrawing = true;
                        } else {
                            drawingPoints.push({ x: smoothedX, y: smoothedY, isNewStroke: false, color: currentColor });
                        }
                    } else {
                        isDrawing = false;
                    }
                }
            } else {
                isDrawing = false;
                smoothedX = null; smoothedY = null;
            }

            drawLines(liveCtx);
            liveCtx.restore();
        });

        function drawLines(context) {
            if (drawingPoints.length === 0) return;
            context.lineWidth = 6;
            context.lineCap = 'round';
            context.lineJoin = 'round';

            for (let i = 1; i < drawingPoints.length; i++) {
                const pt = drawingPoints[i];
                if (pt.isNewStroke) {
                    context.beginPath();
                    context.moveTo(pt.x, pt.y);
                } else {
                    context.beginPath();
                    context.moveTo(drawingPoints[i-1].x, drawingPoints[i-1].y);
                    context.lineTo(pt.x, pt.y);
                    context.strokeStyle = pt.color; 
                    context.stroke();
                }
            }
        }

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640,
            height: 480
        });
        camera.start().catch(() => alert("ไม่สามารถเข้าถึงกล้องได้"));

        // --- 2. Smart Button Logic ---
        function getContrastColor(hexColor) {
            const r = parseInt(hexColor.substr(1, 2), 16);
            const g = parseInt(hexColor.substr(3, 2), 16);
            const b = parseInt(hexColor.substr(5, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#1a1a1a' : '#ffffff';
        }

        smartDrawBtn.addEventListener('click', (e) => {
            if (e.target === customColorInput) return;
            if (!isDrawMode) {
                isDrawMode = true;
                colorDot.style.display = "inline-block";
                updateSmartButtonVisual(currentColor);
            } else {
                customColorInput.click();
            }
        });

        customColorInput.addEventListener('input', (e) => {
            currentColor = e.target.value; 
            colorDot.style.backgroundColor = currentColor;
            updateSmartButtonVisual(currentColor);
            isDrawing = false; 
        });

        function updateSmartButtonVisual(color) {
            smartDrawBtn.style.backgroundColor = color;
            smartDrawBtn.style.borderColor = color;
            const textColor = getContrastColor(color);
            smartDrawBtn.style.color = textColor;
            btnText.innerHTML = '<img src="asset/ok.png" alt="Change color" style="width: 40px; height: 40px;">';
        }

        clearBtn.addEventListener('click', () => {
            drawingPoints = []; isDrawing = false; isDrawMode = false; smoothedX = null; smoothedY = null;
            smartDrawBtn.style.backgroundColor = "#e9ecef"; smartDrawBtn.style.borderColor = "#ced4da"; smartDrawBtn.style.color = "#495057";
            btnText.innerHTML = '<img src="asset/paint.png" alt="Paint" style="width: 40px; height: 40px;">'; colorDot.style.display = "none";
        });

        // --- 3. 📸 ระบบถ่ายภาพ และสลับเข้าสู่ "โหมดตกแต่ง" ---
        snapBtn.addEventListener('click', () => {
            if (liveCanvas.width === 0) return;

            // ตั้งค่าขนาดแคนวาสแต่งรูปให้เท่าแคนวาสจริง
            photoCanvas.width = liveCanvas.width;
            photoCanvas.height = liveCanvas.height;

            // วาดตัวคน (Mirror ขวาไปซ้าย) + เส้นวาดสดลงบนแคนวาสชั่วคราว
            photoCtx.save();
            photoCtx.translate(photoCanvas.width, 0);
            photoCtx.scale(-1, 1);
            photoCtx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);
            drawLines(photoCtx);
            photoCtx.restore();

            // แปลงแคนวาสให้กลายเป็นภาพนิ่งเก็บไว้เป็นภาพพื้นหลัง
            bgImageElement.src = photoCanvas.toDataURL('image/png');
            bgImageElement.onload = () => {
                // เคลียร์ค่าตกแต่งเก่าออกทั้งหมด
                stickers = [];
                selectedFrame = 'none';
                
                // สลับหน้าจอ UI ไปโหมดตกแต่งรูป
                liveZone.style.display = 'none';
                decorationZone.style.display = 'flex';
                
                renderDecorationCanvas(); // สั่งเรนเดอร์ภาพแคนวาสแต่งรูป
            };
        });

        // --- 4. 🎨 ระบบจัดการ Canvas ตกแต่ง (Render Frame & Drag Sticker) ---
        function renderDecorationCanvas() {
            photoCtx.clearRect(0, 0, photoCanvas.width, photoCanvas.height);
            
            // 1. วาดรูปถ่ายต้นฉบับที่เป็นพื้นหลัง
            photoCtx.drawImage(bgImageElement, 0, 0, photoCanvas.width, photoCanvas.height);

            // 2. วาดกรอบรูป (ตกแต่งเพิ่มด้วยโค้ดสีสดๆ)
            if (selectedFrame === 'pink') {
                photoCtx.strokeStyle = '#ff8da1';
                photoCtx.lineWidth = 24;
                photoCtx.strokeRect(0, 0, photoCanvas.width, photoCanvas.height);
            } else if (selectedFrame === 'blue') {
                photoCtx.strokeStyle = '#00f2fe';
                photoCtx.lineWidth = 24;
                photoCtx.strokeRect(0, 0, photoCanvas.width, photoCanvas.height);
            }

            // 3. วาดสติกเกอร์ทั้งหมดที่อยู่ในลิสต์ลงไป
            photoCtx.font = "40px Arial";
            photoCtx.textBaseline = "middle";
            photoCtx.textAlign = "center";
            
            stickers.forEach(stk => {
                photoCtx.fillText(stk.text, stk.x, stk.y);
            });
        }

        // ฟังก์ชันเพิ่มสติกเกอร์ตัวใหม่เข้าไปตรงกลางแคนวาส
        window.addSticker = function(emoji) {
            stickers.push({
                text: emoji,
                x: photoCanvas.width / 2 + (Math.random() * 40 - 20), // ให้อยู่แถวๆ ตรงกลางจอ
                y: photoCanvas.height / 2 + (Math.random() * 40 - 20),
                size: 40
            });
            renderDecorationCanvas();
        };

        // ฟังก์ชันเปลี่ยนสีสไตล์กรอบรูป
        window.changeFrame = function(frameStyle) {
            selectedFrame = frameStyle;
            renderDecorationCanvas();
        };

        // --- 5. 👆 ระบบลากสติกเกอร์ย้ายตำแหน่งแบบเรียลไทม์ (Drag and Drop บน Canvas) ---
        function getMousePos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            // คำนวณอัตราส่วนเนื่องจากแคนวาสถูกบีบขยายด้วย CSS
            return {
                x: (evt.clientX - rect.left) / (rect.right - rect.left) * canvas.width,
                y: (evt.clientY - rect.top) / (rect.bottom - rect.top) * canvas.height
            };
        }

        function handleStart(clientX, clientY) {
            const pos = getMousePos(photoCanvas, { clientX, clientY });
            
            // วนลูปเช็กว่ากดโดนสติกเกอร์ตัวไหนไหม (เช็กจากตัวล่าสุดที่อยู่บนสุดก่อน)
            for (let i = stickers.length - 1; i >= 0; i--) {
                const stk = stickers[i];
                // เช็กระยะห่างแบบคร่าวๆ รอบๆ ตัว Emoji
                if (Math.hypot(pos.x - stk.x, pos.y - stk.y) < stk.size) {
                    draggedSticker = stk;
                    break;
                }
            }
        }

        function handleMove(clientX, clientY) {
            if (!draggedSticker) return;
            const pos = getMousePos(photoCanvas, { clientX, clientY });
            draggedSticker.x = pos.x;
            draggedSticker.y = pos.y;
            renderDecorationCanvas();
        }

        function handleEnd() {
            draggedSticker = null;
        }

        // อีเวนต์ดักจับสำหรับ เมาส์ (PC)
        photoCanvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleEnd);

        // อีเวนต์ดักจับสำหรับ นิ้วสัมผัส (มือถือ)
        photoCanvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) handleStart(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', handleEnd);


        // --- 6. ปุ่มเปลี่ยนโหมดถอยกลับ และ ปุ่มดาวน์โหลดรูปภาพ ---
        backBtn.addEventListener('click', () => {
            // สลับกลับไปหน้าจอกล้องสด
            decorationZone.style.display = 'none';
            liveZone.style.display = 'flex';
        });

        downloadBtn.addEventListener('click', () => {
            try {
                const dataUrl = photoCanvas.toDataURL('image/png');
                const tempLink = document.createElement('a');
                tempLink.download = `myphoto-${Date.now()}.png`;
                tempLink.href = dataUrl;
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการดาวน์โหลดรูปภาพ");
            }
        });
    </script>
</body>
</html>
