<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Booth with Decoration Mode</title>

    <!-- โหลด MediaPipe สำหรับตรวจจับมือด้วย AI -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.6rem;
            margin: 10px 0 20px 0;
            color: #333;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 500px; /* คุมขนาดไม่ให้ใหญ่เกินไปบนจอคอม และพอดีเป๊ะบนมือถือ */
            justify-content: center;
        }

        .box {
            background: white;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .box h3 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #444;
        }

        .view-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background-color: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2);
        }

        video {
            display: none;
        }

        /* สำหรับหน้าตกแต่งรูปภาพ */
        #photo-canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: move; /* เปลี่ยน cursor ให้รู้ว่าลากของได้ */
        }

        #live-canvas {
            transform: scaleX(-1);
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .toolbar {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            width: 100%;
            justify-content: center;
            flex-wrap: wrap;
        }

        button, .smart-btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        button:active, .smart-btn:active {
            transform: scale(0.98);
        }

        /* ปุ่ม Snap ถ่ายรูป */
        .btn-snap {
            background-color: #28a745;
            color: white;
        }
        .btn-snap:hover { background-color: #218838; }

        /* ปุ่มล้างหน้าจอ */
        .btn-clear {
            background-color: #6c757d;
            color: white;
        }
        .btn-clear:hover { background-color: #5a6268; }

        /* ปุ่มดาวน์โหลด */
        .btn-download {
            background-color: #ffc107;
            color: #212529;
            text-shadow: none;
            width: 100%;
        }
        .btn-download:hover { background-color: #e0a800; }

        /* 🎨 Smart Button Style (เริ่มต้นคือโหมดปิดสีเทา) */
        .smart-btn {
            position: relative;
            background-color: #e9ecef;
            color: #495057;
            text-shadow: none;
            border: 1px solid #ced4da;
        }

        #custom-color {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }

        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 6px;
            border: 1px solid rgba(0,0,0,0.2);
            display: inline-block;
        }

        /* 🎪 ส่วนเลือกไอเทมตกแต่ง (Stickers & Frames) */
        .deco-selector {
            width: 100%;
            margin-top: 15px;
            text-align: left;
        }
        .deco-label {
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }
        .item-list {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 5px 0;
        }
        .deco-item {
            font-size: 1.8rem;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 5px 10px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.1s;
        }
        .deco-item:hover {
            transform: scale(1.1);
            background: #e9ecef;
        }

        /* ซ่อนส่วนตกแต่งไว้ก่อน จะโชว์เมื่อถ่ายรูปเสร็จ */
        #decoration-zone {
            display: none;
        }
    </style>
</head>

<body>

    <h1>📸 AI Web Photo Booth</h1>

    <div class="container">
        <!-- ฝั่งแสดงผลกล้องสด -->
        <div class="box">
            <h3>Live Preview</h3>
            <div class="view-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="live-canvas"></canvas>
            </div>

            <div class="toolbar">
                <div id="smart-draw-btn" class="smart-btn">
                    <span id="color-dot" class="color-indicator" style="background-color: #00f2fe; display: none;"></span>
                    <span id="btn-text">🖌️ โหมดวาดรูป: ปิด</span>
                    <input type="color" id="custom-color" value="#00f2fe">
                </div>
                <button id="clear-btn" class="btn-clear">🗑️ ล้างเส้น</button>
                <button id="snap-btn" class="btn-snap">📸 ถ่ายรูป!</button>
            </div>
        </div>

        <!-- ฝั่งรูปผลลัพธ์ภาพถ่าย -->
        <div class="box">
            <h3>Captured Photo</h3>
            <div class="view-wrapper">
                <canvas id="photo-canvas"></canvas>
            </div>

            <!-- เลือกสติกเกอร์ (ใช้ Emoji แทนรูปภาพเพื่อให้ทดสอบได้ทันที) -->
            <div class="deco-selector">
                <span class="deco-label">✨ เลือกสติกเกอร์:</span>
                <div class="item-list">
                    <div class="deco-item" onclick="addSticker('❤️')">❤️</div>
                    <div class="deco-item" onclick="addSticker('✨')">✨</div>
                    <div class="deco-item" onclick="addSticker('👑')">👑</div>
                    <div class="deco-item" onclick="addSticker('🕶️')">🕶️</div>
                    <div class="deco-item" onclick="addSticker('🐱')">🐱</div>
                    <div class="deco-item" onclick="addSticker('🌸')">🌸</div>
                </div>
            </div>

            <!-- เลือกกรอบรูป -->
            <div class="deco-selector">
                <span class="deco-label">🖼️ เลือกกรอบรูป:</span>
                <div class="item-list">
                    <div class="deco-item" style="font-size:1rem;" onclick="changeFrame('none')">❌ ไม่มีกรอบ</div>
                    <div class="deco-item" style="font-size:1rem; color: #e83e8c;" onclick="changeFrame('pink')">🌸 กรอบชมพู</div>
                    <div class="deco-item" style="font-size:1rem; color: #007bff;" onclick="changeFrame('blue')">💧 กรอบฟ้า</div>
                </div>
            </div>

            <div class="toolbar">
                <button id="back-btn" class="btn-back">🔄 ถ่ายใหม่</button>
                <button id="download-btn" class="btn-download">💾 ดาวน์โหลดรูปภาพสมบูรณ์</button>
            </div>
        </div>

    </div>

    <script>
        const video = document.getElementById('webcam');
        const liveCanvas = document.getElementById('live-canvas');
        const liveCtx = liveCanvas.getContext('2d');
        const photoCanvas = document.getElementById('photo-canvas');
        const photoCtx = photoCanvas.getContext('2d');

        // โซนสลับหน้า UI
        const liveZone = document.getElementById('live-zone');
        const decorationZone = document.getElementById('decoration-zone');

        const snapBtn = document.getElementById('snap-btn');
        const clearBtn = document.getElementById('clear-btn');
        const backBtn = document.getElementById('back-btn');
        const downloadBtn = document.getElementById('download-btn');

        const smartDrawBtn = document.getElementById('smart-draw-btn');
        const btnText = document.getElementById('btn-text');
        const colorDot = document.getElementById('color-dot');
        const customColorInput = document.getElementById('custom-color');

        // สเตตัสเริ่มต้น
        let isDrawMode = false;
        let isDrawing = false;
        let drawingPoints = [];
        let currentColor = '#00f2fe'; 

        const frameImage = new Image();
        frameImage.src = 'frame.png';
        frameImage.crossOrigin = "anonymous"; 

        // 1. MediaPipe Hands Setup
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (liveCanvas.width !== video.videoWidth && video.videoWidth > 0) {
                liveCanvas.width = video.videoWidth;
                liveCanvas.height = video.videoHeight;
            }

            liveCtx.save();
            liveCtx.drawImage(results.image, 0, 0, liveCanvas.width, liveCanvas.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const indexFingerTip = landmarks[8];

                const x = indexFingerTip.x * liveCanvas.width;
                const y = indexFingerTip.y * liveCanvas.height;

                // วาดพอยเตอร์สีแดงชี้ตำแหน่งนิ้วมือ
                liveCtx.fillStyle = '#ff0000';
                liveCtx.beginPath();
                liveCtx.arc(x, y, 8, 0, 2 * Math.PI);
                liveCtx.fill();
                liveCtx.stroke();

                if (isDrawMode) {
                    if (isPinching) {
                        if (!isDrawing) {
                            drawingPoints.push({ x: smoothedX, y: smoothedY, isNewStroke: true, color: currentColor });
                            isDrawing = true;
                        } else {
                            drawingPoints.push({ x: smoothedX, y: smoothedY, isNewStroke: false, color: currentColor });
                        }
                    } else {
                        drawingPoints.push({ x, y, isNewStroke: false, color: currentColor });
                    }
                }
            } else {
                isDrawing = false; 
            }

            drawLines(liveCtx);
            liveCtx.restore();
        });

        function drawLines(context) {
            if (drawingPoints.length === 0) return;
            context.lineWidth = 6;
            context.lineCap = 'round';
            context.lineJoin = 'round';

            for (let i = 1; i < drawingPoints.length; i++) {
                const pt = drawingPoints[i];
                if (pt.isNewStroke) {
                    context.beginPath();
                    context.moveTo(pt.x, pt.y);
                } else {
                    context.beginPath();
                    context.moveTo(drawingPoints[i-1].x, drawingPoints[i-1].y);
                    context.lineTo(pt.x, pt.y);
                    context.strokeStyle = pt.color; 
                    context.stroke();
                }
            }
        }

        // 2. Camera Setup
        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640,
            height: 480
        });
        camera.start().catch(() => alert("ไม่สามารถเข้าถึงกล้องได้"));

        // 3. 🖌️ ฟังก์ชันคำนวณสีตัวหนังสือ (Contrast) ให้ตัดกับพื้นหลังอัตโนมัติ
        function getContrastColor(hexColor) {
            const r = parseInt(hexColor.substr(1, 2), 16);
            const g = parseInt(hexColor.substr(3, 2), 16);
            const b = parseInt(hexColor.substr(5, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? '#1a1a1a' : '#ffffff';
        }

        // 4. Smart Button Click Logic
        smartDrawBtn.addEventListener('click', (e) => {
            if (e.target === customColorInput) return; // ป้องกันการเบิ้ลคลิกซ้อนลูป

            if (!isDrawMode) {
                isDrawMode = true;
                colorDot.style.display = "inline-block";
                updateSmartButtonVisual(currentColor);
            } else {
                customColorInput.click();
            }
        });

        customColorInput.addEventListener('input', (e) => {
            currentColor = e.target.value; 
            colorDot.style.backgroundColor = currentColor;
            updateSmartButtonVisual(currentColor);
            isDrawing = false; 
        });

        function updateSmartButtonVisual(color) {
            smartDrawBtn.style.backgroundColor = color;
            smartDrawBtn.style.borderColor = color;
            const textColor = getContrastColor(color);
            smartDrawBtn.style.color = textColor;
            btnText.textContent = "👌 จีบนิ้วเพื่อวาด / คลิกเปลี่ยนสี";
        }

        clearBtn.addEventListener('click', () => {
            drawingPoints = [];
            isDrawing = false;
            isDrawMode = false;
            
            // รีเซ็ตหน้าตาปุ่ม Smart Button กลับเป็นสีเทาปิดโหมด
            smartDrawBtn.style.backgroundColor = "#e9ecef";
            smartDrawBtn.style.borderColor = "#ced4da";
            smartDrawBtn.style.color = "#495057";
            btnText.textContent = "🖌️ โหมดวาดรูป: ปิด";
            colorDot.style.display = "none";
        });

        // 5. Snapshot & Download Logic
        snapBtn.addEventListener('click', () => {
            if (liveCanvas.width === 0) return;

            // ตั้งค่าขนาดแคนวาสแต่งรูปให้เท่าแคนวาสจริง
            photoCanvas.width = liveCanvas.width;
            photoCanvas.height = liveCanvas.height;

            // วาดตัวคน (Mirror ขวาไปซ้าย)
            photoCtx.save();
            photoCtx.translate(photoCanvas.width, 0);
            photoCtx.scale(-1, 1);
            photoCtx.drawImage(video, 0, 0, photoCanvas.width, photoCanvas.height);
            photoCtx.restore();

            // วาดเส้นแต่งเติม
            photoCtx.save();
            photoCtx.translate(photoCanvas.width, 0);
            photoCtx.scale(-1, 1);
            drawLines(photoCtx);
            photoCtx.restore();

            // แปะกรอบรูป PNG ด้านบนสุด
            if (frameImage.complete && frameImage.naturalWidth !== 0) {
                photoCtx.drawImage(frameImage, 0, 0, photoCanvas.width, photoCanvas.height);
            }
        });

        downloadBtn.addEventListener('click', () => {
            try {
                const dataUrl = photoCanvas.toDataURL('image/png');
                const tempLink = document.createElement('a');
                tempLink.download = `myphoto-${Date.now()}.png`;
                tempLink.href = dataUrl;
                document.body.appendChild(tempLink);
                tempLink.click();
                document.body.removeChild(tempLink);
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการดาวน์โหลดรูปภาพ");
            }
        });
    </script>
</body>
</html>
